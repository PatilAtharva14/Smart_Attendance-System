<!DOCTYPE html>
<html>

<head>

    <title>
        Register Student
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <style>

        body{
            background:#0E1117;
            color:white;
            font-family:Arial;
            text-align:center;
        }

        .container{
            margin-top:30px;
        }

        input{
            padding:12px;
            width:300px;
            margin:10px;
            border:none;
            border-radius:8px;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:10px;
            background:#00ADB5;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#00939A;
        }

        img{
            margin-top:20px;
            border-radius:15px;
            border:4px solid #00ADB5;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>
        🧑 Register Student
    </h1>

    <!-- ========================= -->
    <!-- LIVE CAMERA -->
    <!-- ========================= -->

    <img
        src="{{ url_for('register_feed') }}"
        width="700"
    >

    <br><br>

    <!-- ========================= -->
    <!-- REGISTRATION FORM -->
    <!-- ========================= -->

    <form
        action="/capture_student"
        method="POST"
    >

        <input
            type="text"
            name="student_name"
            placeholder="Enter Student Name"
            required
        >

        <br>

        <input
            type="number"
            name="capture_count"
            value="5"
            min="5"
            max="20"
        >

        <br><br>

        <button type="submit">

            Capture Face Images

        </button>

    </form>

    <br>

    <a href="/">

        <button>

            Back

        </button>

    </a>

</div>

</body>
</html>
